<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库AI客户端 V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 350px;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 6px;
        }
        
        .status-badge {
            background: #10b981;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .form-group { margin-bottom: 16px; }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2a5298;
        }
        
        textarea { min-height: 100px; resize: vertical; }
        
        .btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(42, 82, 152, 0.3);
        }
        
        .btn:active { transform: translateY(0); }
        
        .btn-secondary { background: #6b7280; }
        .btn-secondary:hover { background: #4b5563; }
        
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .preview-card {
            background: #1f2937;
            color: #d1d5db;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 16px;
        }
        
        .log-container {
            background: #1f2937;
            color: #9ca3af;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 6px;
            padding: 6px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
        }
        
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-info { color: #60a5fa; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1e3c72;
        }
        
        .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
        
        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab {
            padding: 8px 16px;
            background: #f3f4f6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: #1e3c72;
            color: white;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
        }
        
        .message.user {
            background: #dbeafe;
            margin-left: 20px;
        }
        
        .message.assistant {
            background: #e0e7ff;
            margin-right: 20px;
        }
        
        .message-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .message.user .message-label { color: #2563eb; }
        .message.assistant .message-label { color: #4f46e5; }
        
        .message-content {
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
        }
        
        .input-row input { flex: 1; }
        
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr 1fr; }
            .card:nth-child(3) { grid-column: span 2; }
        }
        
        @media (max-width: 640px) {
            .container { grid-template-columns: 1fr; }
            .card:nth-child(3) { grid-column: span 1; }
        }
        
        .full-width { grid-column: span 3; }
        
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：对话 + 生成卡片 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">🤖 AI 对话</h2>
                <span class="status-badge"><span class="status-dot"></span>在线</span>
            </div>
            
            <div class="tab-container">
                <div class="tab active" onclick="switchTab('chat')">对话</div>
                <div class="tab" onclick="switchTab('generate')">生成卡片</div>
            </div>
            
            <!-- 对话标签 -->
            <div class="tab-content active" id="chatTab">
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-label">AI</div>
                        <div class="message-content">你好！我是知识库AI助手。我可以帮你：
• 回答问题
• 基于文档生成知识卡片
• 一键写入记忆库</div>
                    </div>
                </div>
                <div class="input-row">
                    <input type="text" id="chatInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button class="btn" onclick="sendChat()">发送</button>
                </div>
            </div>
            
            <!-- 生成卡片标签 -->
            <div class="tab-content" id="generateTab">
                <div class="form-group">
                    <label>主题</label>
                    <input type="text" id="topic" placeholder="例如：Linux.do 站长秦始皇">
                </div>
                
                <div class="form-group">
                    <label>源文件（可选）</label>
                    <select id="sourceFile">
                        <option value="">-- 无需源文件 --</option>
                    </select>
                </div>
                
                <div class="btn-group">
                    <button class="btn" onclick="generateCard()">🔧 生成卡片</button>
                    <button class="btn btn-success" onclick="generateAndSend()">🚀 一键生成并发送</button>
                </div>
            </div>
        </div>
        
        <!-- 中间：卡片预览 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📝 卡片预览</h2>
                <button class="btn btn-secondary" onclick="refreshStatus()" style="padding: 6px 12px; font-size: 12px;">🔄</button>
            </div>
            
            <div class="preview-card" id="cardPreview">
// 生成的卡片将显示在这里
            </div>
            
            <div class="btn-group">
                <button class="btn" onclick="copyCard()">📋 复制</button>
                <button class="btn btn-success" onclick="sendToInbox()">📤 发送到 Inbox</button>
            </div>
        </div>
        
        <!-- 右侧：状态 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📊 系统状态</h2>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="cardCount">0</div>
                    <div class="stat-label">记忆库卡片</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">待处理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="processedCount">0</div>
                    <div class="stat-label">已处理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="historyCount">0</div>
                    <div class="stat-label">对话历史</div>
                </div>
            </div>
            
            <label>操作日志</label>
            <div class="log-container" id="logContainer">
                <div class="log-entry log-info">[20:31] 系统就绪</div>
            </div>
            
            <div class="btn-group" style="margin-top: 12px;">
                <button class="btn btn-secondary" onclick="clearHistory()" style="font-size: 12px;">🗑️ 清空历史</button>
            </div>
        </div>
    </div>
    
    <!-- 底部：完整JSON -->
    <div class="card" style="margin-top: 20px;">
        <div class="card-header">
            <h2 class="card-title">📄 完整 JSON</h2>
        </div>
        <div class="preview-card" id="fullJson" style="max-height: 200px;">
// 完整指令JSON
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentCard = null;
        
        // 初始化
        window.onload = function() {
            refreshStatus();
            loadFileList();
        };
        
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        }
        
        // 添加日志
        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${time}] ${msg}`;
            container.insertBefore(entry, container.firstChild);
        }
        
        // 刷新状态
        async function refreshStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                document.getElementById('cardCount').textContent = data.card_count;
                document.getElementById('pendingCount').textContent = data.pending_count;
                document.getElementById('processedCount').textContent = data.processed_count;
                document.getElementById('historyCount').textContent = data.history_length;
            } catch(e) {
                addLog('无法连接后端服务', 'error');
            }
        }
        
        // 加载文件列表
        async function loadFileList() {
            try {
                const res = await fetch(`${API_BASE}/files`);
                const data = await res.json();
                const select = document.getElementById('sourceFile');
                data.files.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.name;
                    opt.textContent = `${f.name} (${(f.size/1024).toFixed(1)}KB)`;
                    select.appendChild(opt);
                });
            } catch(e) {
                console.log('加载文件列表失败', e);
            }
        }
        
        // 发送对话
        async function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;
            
            input.value = '';
            
            // 显示用户消息
            const msgs = document.getElementById('chatMessages');
            msgs.innerHTML += `
                <div class="message user">
                    <div class="message-label">你</div>
                    <div class="message-content">${msg}</div>
                </div>
            `;
            
            addLog('AI 正在思考...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                
                msgs.innerHTML += `
                    <div class="message assistant">
                        <div class="message-label">AI</div>
                        <div class="message-content">${data.reply}</div>
                    </div>
                `;
                msgs.scrollTop = msgs.scrollHeight;
                
                addLog('对话完成', 'success');
                refreshStatus();
            } catch(e) {
                addLog('对话失败: ' + e.message, 'error');
            }
        }
        
        // 生成卡片
        async function generateCard() {
            const topic = document.getElementById('topic').value.trim();
            const sourceFile = document.getElementById('sourceFile').value;
            
            if(!topic) {
                alert('请输入主题');
                return;
            }
            
            addLog('正在生成卡片...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/generate-card`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic, source_file: sourceFile})
                });
                const data = await res.json();
                
                currentCard = data.card;
                
                const content = data.card.payload.content;
                const preview = `### 【${content.code}】${content.title}
- **标签**: ${content.tags.join(', ')}
- **时间**: ${content.timestamp}

${content.body.substring(0, 500)}...`;
                
                document.getElementById('cardPreview').textContent = preview;
                document.getElementById('fullJson').textContent = JSON.stringify(data.card, null, 2);
                
                addLog('卡片生成完成', 'success');
            } catch(e) {
                addLog('生成失败: ' + e.message, 'error');
            }
        }
        
        // 一键生成并发送
        async function generateAndSend() {
            const topic = document.getElementById('topic').value.trim();
            const sourceFile = document.getElementById('sourceFile').value;
            
            if(!topic) {
                alert('请输入主题');
                return;
            }
            
            addLog('正在生成并发送...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/generate-and-send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({topic, source_file: sourceFile})
                });
                const data = await res.json();
                
                currentCard = data.card;
                
                const content = data.card.payload.content;
                const preview = `### 【${content.code}】${content.title}
- **标签**: ${content.tags.join(', ')}
- **时间**: ${content.timestamp}

${content.body.substring(0, 500)}...`;
                
                document.getElementById('cardPreview').textContent = preview;
                document.getElementById('fullJson').textContent = JSON.stringify(data.card, null, 2);
                
                addLog('已发送到 inbox: ' + data.filepath, 'success');
                addLog('等待监听器处理...', 'info');
                
                setTimeout(refreshStatus, 2000);
            } catch(e) {
                addLog('发送失败: ' + e.message, 'error');
            }
        }
        
        // 发送到 Inbox
        async function sendToInbox() {
            if(!currentCard) {
                alert('请先生成卡片');
                return;
            }
            
            addLog('正在发送到 inbox...', 'info');
            
            try {
                const res = await fetch(`${API_BASE}/send-to-inbox`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card: currentCard})
                });
                const data = await res.json();
                
                addLog('已发送: ' + data.filepath, 'success');
                setTimeout(refreshStatus, 2000);
            } catch(e) {
                addLog('发送失败: ' + e.message, 'error');
            }
        }
        
        // 复制卡片
        function copyCard() {
            if(!currentCard) {
                alert('请先生成卡片');
                return;
            }
            navigator.clipboard.writeText(JSON.stringify(currentCard, null, 2));
            addLog('已复制到剪贴板', 'success');
        }
        
        // 清空历史
        async function clearHistory() {
            if(!confirm('确定清空对话历史？')) return;
            
            try {
                await fetch(`${API_BASE}/history/clear`, {method: 'POST'});
                document.getElementById('chatMessages').innerHTML = `
                    <div class="message assistant">
                        <div class="message-label">AI</div>
                        <div class="message-content">历史已清空</div>
                    </div>
                `;
                addLog('历史已清空', 'success');
                refreshStatus();
            } catch(e) {
                addLog('清空失败', 'error');
            }
        }
    </script>
</body>
</html>
